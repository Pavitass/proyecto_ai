<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mesa de ayuda TI · Agente RAG</title>
  <link rel="stylesheet" href="/static/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js" crossorigin="anonymous"></script>
  <script src="/static/livesheet.js" defer></script>
</head>
<body>
  <script>
    window.__HELPDESK_BASE__ = {{ helpdesk_base_url | tojson }};
  </script>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <span class="logo" aria-hidden="true">HD</span>
        <div><strong>HelpDesk IA</strong></div>
      </div>
      <div class="panel" id="ticketsPanel">
        <div class="tickets-header">
          <h3>Tickets</h3>
          <div class="tickets-tabs">
            <button type="button" class="tab-btn active" data-scope="thread">Esta conversación</button>
            <button type="button" class="tab-btn" data-scope="all">Todos</button>
          </div>
        </div>
        <div class="tickets" id="tickets"></div>
      </div>
      <p class="foot muted">Sesión: <code id="tid"></code></p>
    </aside>
    <main class="main">
      <header class="topbar">
        <h1>Asistente de soporte</h1>
        <button type="button" class="btn-ghost" id="btnNewThread" title="Nueva conversación">Nueva sesión</button>
      </header>
      <div class="quick-row" id="quickRow" aria-label="Accesos rápidos"></div>
      <div id="log" class="chat-log"></div>
      <div id="liveSheet" class="live-sheet live-sheet--empty" aria-expanded="false">
        <button type="button" id="liveSheetTab" class="live-sheet-tab" aria-expanded="false">
          Plan en vivo
        </button>
        <div id="liveSheetPanel" class="live-sheet-panel" role="region" aria-label="Plan en vivo">
          <div class="live-sheet-head">
            <strong>Panel interactivo</strong>
            <span class="live-sheet-muted">Pasos, Kanban y sliders (se pliega con la pestaña inferior)</span>
          </div>
          <div id="liveSheetScroll" class="live-sheet-scroll">
            <div id="liveSheetPlan"></div>
            <div id="liveSheetKanban"></div>
            <div id="liveSheetSliders"></div>
          </div>
        </div>
      </div>
      <div class="composer-wrap">
        <div id="guidedBar" class="guided-bar hidden" role="region" aria-label="Modo guiado paso a paso">
          <div class="guided-bar-inner">
            <div class="guided-bar-top">
              <strong>Modo guiado</strong>
              <span id="guidedStepLabel" class="guided-step-label"></span>
            </div>
            <p id="guidedStepText" class="guided-step-text"></p>
            <div class="guided-actions">
              <button type="button" class="btn-ghost btn-tiny" id="btnGuidedCapture">Capturar pantalla (este paso)</button>
              <button type="button" class="btn-ghost btn-tiny" id="btnGuidedNext">Hecho, siguiente instrucción</button>
              <button type="button" class="btn-ghost btn-tiny" id="btnGuidedStuck">Me atasco</button>
              <button type="button" class="btn-ghost btn-tiny" id="btnGuidedClose">Salir</button>
            </div>
          </div>
        </div>
        <div class="composer-tools" id="composerTools">
          <button type="button" class="btn-ghost btn-tiny" id="btnGuided" title="Seguir un plan de acción paso a paso">Guiado</button>
          <input type="file" id="shotFile" accept="image/*" hidden multiple />
          <button type="button" class="btn-ghost btn-tiny" id="btnShotFile" title="Adjuntar hasta 2 imágenes">Imagen</button>
          <button type="button" class="btn-ghost btn-tiny" id="btnShotScreen" title="Capturar una ventana o pantalla">Pantalla</button>
          <span id="shotPreview" class="shot-preview"></span>
        </div>
        <video id="capVideo" playsinline muted style="display:none;width:0;height:0;"></video>
        <canvas id="capCanvas" style="display:none;"></canvas>
        <form id="f" class="composer" autocomplete="off">
          <div class="composer-input-shell">
            <textarea
              id="msg"
              rows="1"
              placeholder="Mensaje…"
              required
              maxlength="8000"
            ></textarea>
          </div>
          <button type="submit" id="btnSend" class="composer-send" aria-label="Enviar mensaje">Enviar</button>
        </form>
      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal tk-modal-card">
      <button type="button" class="close-x" id="modalClose" aria-label="Cerrar">&times;</button>
      <div class="tk-head">
        <h2 id="modalTitle">Ticket</h2>
        <div class="tk-chips" id="tkChips" hidden>
          <span id="tkPriority" class="priority-chip">—</span>
          <span id="tkCategory" class="muted-chip">—</span>
          <span id="tkState" class="muted-chip">—</span>
        </div>
        <code id="tkId" class="muted" hidden></code>
      </div>
      <div class="modal-actions" id="modalActions" hidden>
        <button type="button" class="btn-danger" id="btnDeleteTicket">Eliminar ticket</button>
      </div>
      <div id="modalBody" class="md-content"></div>
      <footer class="tk-foot" id="tkFoot" hidden>
        <span id="tkDates" class="muted"></span>
        <div class="tk-actions">
          <button type="button" id="tkContinue" class="btn-primary">Continuar en chat</button>
        </div>
      </footer>
    </div>
  </div>

  <script>
    const tidKey = "helpdesk_thread_id";
    const QUICK = [
      { label: "VPN no conecta", text: "La VPN no conecta desde casa. ¿Qué pasos sigo?" },
      { label: "Correo / Outlook", text: "No me llegan correos nuevos en Outlook. ¿Cómo lo reviso?" },
      { label: "Wi‑Fi / red", text: "Tengo internet pero no accedo a recursos internos. Ayuda." },
      { label: "Impresora", text: "La impresora de red no imprime y hay documentos en cola." },
      { label: "Abrir ticket", text: "Quiero registrar un ticket: no tengo acceso a una carpeta compartida." },
    ];

    const urlParams = new URLSearchParams(location.search);
    window.__HELPDESK_IN_ELECTRON__ =
      navigator.userAgent.includes("Electron") || urlParams.get("electron_app") === "1";
    if (window.__HELPDESK_IN_ELECTRON__) {
      document.documentElement.classList.add("electron-app");
    }

    function uuid() {
      return crypto.randomUUID();
    }
    let threadId = localStorage.getItem(tidKey) || uuid();
    const qpThread = urlParams.get("thread");
    if (qpThread && qpThread.trim().length >= 8) {
      threadId = qpThread.trim();
    }
    localStorage.setItem(tidKey, threadId);
    window.__HELPDESK_THREAD_ID__ = threadId;
    const tidEl = document.getElementById("tid");
    function refreshTidDisplay() {
      tidEl.textContent = threadId.slice(0, 8) + "…";
    }
    refreshTidDisplay();

    const log = document.getElementById("log");
    const btnSend = document.getElementById("btnSend");
    const msgTa = document.getElementById("msg");
    function syncMsgTextareaHeight() {
      if (!msgTa) return;
      msgTa.style.height = "auto";
      const cap = 132;
      msgTa.style.height = Math.min(msgTa.scrollHeight, cap) + "px";
    }
    if (msgTa) {
      msgTa.addEventListener("input", syncMsgTextareaHeight);
      syncMsgTextareaHeight();
    }
    const pendingShots = [];
    let visionAvailable = false;
    window.__HELPDESK_DESKTOP_PY__ = false;
    window.__HELPDESK_DESKTOP_FORCE_ACK__ = false;

    async function loadCapabilities() {
      try {
        const r = await fetch("/api/capabilities");
        const j = await r.json();
        visionAvailable = !!j.vision;
        const bf = document.getElementById("btnShotFile");
        const bs = document.getElementById("btnShotScreen");
        [bf, bs].forEach((b) => {
          b.disabled = !visionAvailable;
        });
        bf.title = visionAvailable
          ? "Adjuntar imagen (máx. 2)"
          : "Configura visión (GOOGLE_API_KEY o OPENAI_API_KEY / HELPDESK_VISION_OPENAI_*)";
        bs.title = visionAvailable
          ? "Capturar ventana o pantalla (1 frame)"
          : "Configura visión (GOOGLE_API_KEY o OPENAI_API_KEY / HELPDESK_VISION_OPENAI_*)";
        window.__HELPDESK_DESKTOP_PY__ = !!j.desktop_py_exec;
        window.__HELPDESK_DESKTOP_FORCE_ACK__ = !!j.desktop_force_human_ack;
        updateDesktopHint();
      } catch (_) {
        /* capacidades opcionales */
      }
    }

    function b64FromDataUrl(dataUrl) {
      const i = dataUrl.indexOf(",");
      return i >= 0 ? dataUrl.slice(i + 1) : dataUrl;
    }

    function scaleDataUrl(dataUrl, maxW) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          let w = img.width;
          let h = img.height;
          if (w > maxW) {
            h = Math.round((h * maxW) / w);
            w = maxW;
          }
          const c = document.getElementById("capCanvas");
          c.width = w;
          c.height = h;
          const ctx = c.getContext("2d");
          ctx.drawImage(img, 0, 0, w, h);
          resolve(c.toDataURL("image/jpeg", 0.82));
        };
        img.onerror = () => reject(new Error("imagen"));
        img.src = dataUrl;
      });
    }

    function renderShotPreview() {
      const el = document.getElementById("shotPreview");
      el.innerHTML = "";
      pendingShots.forEach((url, i) => {
        const wrap = document.createElement("span");
        wrap.className = "shot-thumb-wrap";
        const img = document.createElement("img");
        img.className = "shot-thumb";
        img.src = url;
        img.alt = "Captura " + (i + 1);
        const x = document.createElement("button");
        x.type = "button";
        x.className = "shot-remove";
        x.textContent = "×";
        x.title = "Quitar";
        x.addEventListener("click", (e) => {
          e.preventDefault();
          pendingShots.splice(i, 1);
          renderShotPreview();
        });
        wrap.appendChild(img);
        wrap.appendChild(x);
        el.appendChild(wrap);
      });
    }

    document.getElementById("btnShotFile").addEventListener("click", () => {
      if (!visionAvailable) return;
      document.getElementById("shotFile").click();
    });
    document.getElementById("shotFile").addEventListener("change", async (ev) => {
      const files = Array.from(ev.target.files || []).slice(0, 2);
      ev.target.value = "";
      if (!files.length || !visionAvailable) return;
      for (const f of files) {
        if (pendingShots.length >= 2) break;
        const dataUrl = await new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(r.result);
          r.onerror = rej;
          r.readAsDataURL(f);
        });
        try {
          pendingShots.push(await scaleDataUrl(dataUrl, 1280));
        } catch (_) {
          pendingShots.push(String(dataUrl));
        }
      }
      renderShotPreview();
    });

    document.getElementById("btnShotScreen").addEventListener("click", async () => {
      if (!visionAvailable) return;
      if (pendingShots.length >= 2) {
        alert("Máximo 2 capturas. Quita una en las miniaturas.");
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
        const v = document.getElementById("capVideo");
        v.srcObject = stream;
        await v.play();
        await new Promise((r) => setTimeout(r, 350));
        const c = document.getElementById("capCanvas");
        c.width = v.videoWidth;
        c.height = v.videoHeight;
        const ctx = c.getContext("2d");
        ctx.drawImage(v, 0, 0);
        stream.getTracks().forEach((t) => t.stop());
        v.srcObject = null;
        let dataUrl = c.toDataURL("image/jpeg", 0.82);
        dataUrl = await scaleDataUrl(dataUrl, 1280);
        pendingShots.push(dataUrl);
        renderShotPreview();
      } catch (e) {
        if (String(e.name || e) !== "NotAllowedError") alert("Captura cancelada o no disponible: " + e.message);
      }
    });

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function formatTime() {
      return new Date().toLocaleTimeString("es", { hour: "2-digit", minute: "2-digit" });
    }

    function normalizeMarkdownTasks(md) {
      if (!md) return "";
      let s = String(md);
      s = s.replace(/^(\s*)[\*]\s+\[\s*\]\s+/gm, "$1- [ ] ");
      s = s.replace(/^(\s*)[\*]\s+\[x\]\s+/gim, "$1- [x] ");
      s = s.replace(/^(\s*)[\*]\s+\[X\]\s+/g, "$1- [x] ");
      return s;
    }

    function renderMarkdown(md) {
      if (typeof marked === "undefined" || typeof DOMPurify === "undefined") {
        return `<div class="plain">${escapeHtml(md)}</div>`;
      }
      try {
        marked.setOptions({ gfm: true, breaks: true });
        const raw = marked.parse(normalizeMarkdownTasks(md));
        return DOMPurify.sanitize(raw, {
          ADD_TAGS: ["details", "summary", "input"],
          ADD_ATTR: ["target", "rel", "type", "checked", "disabled", "class", "id", "name"],
        });
      } catch {
        return `<div class="plain">${escapeHtml(md)}</div>`;
      }
    }

    function postProcessMd(root) {
      root.querySelectorAll('a[href^="http"]').forEach((a) => {
        a.setAttribute("target", "_blank");
        a.setAttribute("rel", "noopener noreferrer");
      });
    }

    /** Convierte listas ordenadas largas en pasos visuales (solo en burbujas del asistente). */
    function enhanceInteractiveSteps(container) {
      const scope =
        container.classList && container.classList.contains("md-content")
          ? container
          : container.querySelector(".md-content") || container;
      scope.querySelectorAll("ol").forEach((ol) => {
        if (ol.children.length >= 2) ol.classList.add("interactive-steps");
      });
      postProcessMd(scope);
    }

    function addMessage(role, contentHtmlOrText, { isMarkdown = false } = {}) {
      const wrap = document.createElement("div");
      wrap.className = "msg-wrap " + role;
      const meta = document.createElement("div");
      meta.className = "msg-meta";
      meta.innerHTML =
        role === "user"
          ? `<span>Tú</span><span class="dot"></span><span>${formatTime()}</span>`
          : `<span class="dot"></span><span>Asistente TI</span><span>${formatTime()}</span>`;
      const bubble = document.createElement("div");
      bubble.className = "bubble " + role;
      const inner = document.createElement("div");
      inner.className = isMarkdown ? "md-content" : "plain";
      if (isMarkdown) inner.innerHTML = contentHtmlOrText;
      else inner.textContent = contentHtmlOrText;
      bubble.appendChild(inner);
      wrap.appendChild(meta);
      wrap.appendChild(bubble);
      log.appendChild(wrap);
      if (isMarkdown) {
        enhanceInteractiveSteps(bubble);
        if (role === "assistant") wireAssistantTaskCheckboxes(bubble);
        if (role === "assistant" && typeof window.helpdeskEnhanceSteps === "function") {
          window.helpdeskEnhanceSteps(bubble);
        }
      }
      log.scrollTop = log.scrollHeight;
      return wrap;
    }

    function addThinkingCard() {
      const wrap = document.createElement("div");
      wrap.className = "msg-wrap assistant";
      wrap.innerHTML = `
        <div class="msg-meta"><span class="dot"></span><span>Asistente TI</span><span>${formatTime()}</span></div>
        <div class="thinking-card" id="thinkingCard" data-phase="started">
          <div class="thinking-head">
            <span class="spinner" aria-hidden="true"></span>
            <span class="phase-label">Iniciando…</span>
            <span class="trace-stats muted"></span>
            <button type="button" class="trace-toggle" aria-label="Mostrar / ocultar actividad">▾</button>
          </div>
          <ol class="trace-timeline"></ol>
        </div>
      `;
      log.appendChild(wrap);
      log.scrollTop = log.scrollHeight;
      const card = wrap.querySelector(".thinking-card");
      const toggle = card.querySelector(".trace-toggle");
      if (toggle) {
        toggle.addEventListener("click", () => {
          card.classList.toggle("trace-collapsed");
        });
      }
      let _es = null;
      return {
        wrap,
        clear() {
          try { if (_es) _es.close(); } catch (_) {}
          try { wrap.remove(); } catch (_) {}
        },
        attachTrace(turnId) {
          if (typeof window.helpdeskAttachTrace === "function") {
            const demoMode = localStorage.getItem("hd_demo_trace") === "1";
            _es = window.helpdeskAttachTrace(turnId, card, { keepOpen: demoMode });
            return _es;
          }
          return null;
        },
      };
    }

    let currentModalTicketId = null;

    async function deleteTicketById(id) {
      if (!confirm("¿Eliminar este ticket? No se puede deshacer.")) return false;
      const r = await fetch("/api/tickets/" + encodeURIComponent(id), { method: "DELETE" });
      if (r.status === 204) {
        loadTickets();
        return true;
      }
      let msg = "Error al eliminar";
      try {
        const j = await r.json();
        msg = j.detail || msg;
      } catch (_) {}
      alert(msg);
      return false;
    }

    let _ticketsScope = "thread";

    async function loadTickets() {
      const tid = window.__HELPDESK_THREAD_ID__ || "";
      const url = (_ticketsScope === "thread" && tid)
        ? "/api/tickets?thread_id=" + encodeURIComponent(tid)
        : "/api/tickets";
      let data = { tickets: [] };
      try {
        const r = await fetch(url);
        if (r.ok) data = await r.json();
      } catch (_) {}
      const root = document.getElementById("tickets");
      if (!root) return;
      root.innerHTML = "";
      if (!data.tickets || !data.tickets.length) {
        const empty = document.createElement("div");
        empty.className = "muted";
        empty.style.padding = "8px 4px";
        empty.textContent = _ticketsScope === "thread"
          ? "Sin tickets en esta conversación todavía."
          : "Sin tickets registrados.";
        root.appendChild(empty);
        return;
      }
      for (const t of data.tickets) {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "ticket";
        card.dataset.id = t.id;
        const prio = (t.prioridad || "").toLowerCase();
        const chipClass = ["alta","media","baja"].includes(prio) ? prio : "neutral";
        card.innerHTML = `
          <div class="ticket-row1">
            <span class="ticket-title">${(t.titulo || "(sin título)").replace(/</g,"&lt;")}</span>
            <span class="priority-chip priority-${chipClass}">${prio || "—"}</span>
          </div>
          <div class="ticket-row2">
            <span class="ticket-cat">${(t.categoria || "").replace(/</g,"&lt;")}</span>
            <span class="ticket-state">${(t.estado || "").replace(/</g,"&lt;")}</span>
          </div>
          <code class="ticket-id">${String(t.id || "").slice(0, 8)}…</code>
        `;
        card.addEventListener("click", () => {
          if (typeof window.helpdeskOpenTicket === "function") {
            window.helpdeskOpenTicket(t.id);
          } else if (typeof openTicketModal === "function") {
            openTicketModal(t.id);
          }
        });
        root.appendChild(card);
      }
    }

    document.querySelectorAll(".tickets-tabs .tab-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tickets-tabs .tab-btn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        _ticketsScope = btn.dataset.scope || "thread";
        loadTickets();
      });
    });

    async function openTicketModal(id) {
      currentModalTicketId = id;
      const bd = document.getElementById("modalBackdrop");
      const body = document.getElementById("modalBody");
      const title = document.getElementById("modalTitle");
      const modalActions = document.getElementById("modalActions");
      const chips = document.getElementById("tkChips");
      const foot = document.getElementById("tkFoot");
      const tkIdEl = document.getElementById("tkId");
      body.innerHTML = "<p class=\"muted\">Cargando…</p>";
      title.textContent = "Ticket";
      modalActions.hidden = true;
      if (chips) chips.hidden = true;
      if (foot) foot.hidden = true;
      if (tkIdEl) tkIdEl.hidden = true;
      bd.classList.add("open");
      bd.setAttribute("aria-hidden", "false");
      try {
        const r = await fetch("/api/tickets/" + encodeURIComponent(id));
        const raw = await r.json();
        if (!r.ok) throw new Error((raw && raw.detail) || "Error");
        const t = raw && raw.ticket ? raw.ticket : raw;
        title.textContent = t.titulo || "(sin título)";
        modalActions.hidden = false;
        // chips
        const prio = (t.prioridad || "").toLowerCase();
        const prioEl = document.getElementById("tkPriority");
        prioEl.textContent = prio || "—";
        prioEl.className = "priority-chip priority-" + (["alta","media","baja"].includes(prio) ? prio : "neutral");
        document.getElementById("tkCategory").textContent = t.categoria || "—";
        document.getElementById("tkState").textContent = t.estado || "—";
        if (chips) chips.hidden = false;
        if (tkIdEl) { tkIdEl.textContent = "ID: " + (t.id || ""); tkIdEl.hidden = false; }
        // body sections
        const mdParts = [
          "### Descripción",
          t.descripcion_usuario || "",
          "",
          "### Pasos sugeridos",
          t.pasos_sugeridos || "",
        ];
        if (Array.isArray(t.fuentes_kb) && t.fuentes_kb.length) {
          mdParts.push("", "### Fuentes KB", t.fuentes_kb.map((x) => "- " + x).join("\n"));
        } else if (typeof t.fuentes_kb === "string" && t.fuentes_kb.trim()) {
          mdParts.push("", "### Fuentes KB", t.fuentes_kb);
        }
        if (t.motivo_escalacion) {
          mdParts.push("", "### Escalado", t.motivo_escalacion);
        }
        if (t.resolucion_final) {
          mdParts.push("", "### Resolución", t.resolucion_final);
        }
        body.innerHTML = renderMarkdown(mdParts.join("\n"));
        enhanceInteractiveSteps(body);
        // dates footer
        const parts = [];
        if (t.created_at) parts.push("Creado: " + new Date(t.created_at).toLocaleString());
        if (t.resolved_at) parts.push("Resuelto: " + new Date(t.resolved_at).toLocaleString());
        const datesEl = document.getElementById("tkDates");
        if (datesEl) datesEl.textContent = parts.join(" · ");
        if (foot) foot.hidden = false;
        bd._currentTicketId = t.id;
      } catch (e) {
        body.innerHTML = `<p class="plain">Error: ${escapeHtml(e.message)}</p>`;
        modalActions.hidden = true;
        if (chips) chips.hidden = true;
        if (foot) foot.hidden = true;
        if (tkIdEl) tkIdEl.hidden = true;
      }
    }

    window.helpdeskOpenTicket = openTicketModal;

    function closeModal() {
      currentModalTicketId = null;
      const bd = document.getElementById("modalBackdrop");
      document.getElementById("modalActions").hidden = true;
      const chips = document.getElementById("tkChips");
      const foot = document.getElementById("tkFoot");
      const tkIdEl = document.getElementById("tkId");
      if (chips) chips.hidden = true;
      if (foot) foot.hidden = true;
      if (tkIdEl) tkIdEl.hidden = true;
      bd.classList.remove("open");
      bd.setAttribute("aria-hidden", "true");
    }

    (function () {
      const cont = document.getElementById("tkContinue");
      if (!cont) return;
      cont.addEventListener("click", () => {
        const bd = document.getElementById("modalBackdrop");
        const id = (bd && bd._currentTicketId) || currentModalTicketId || "";
        const msgEl = document.getElementById("msg");
        if (msgEl) {
          msgEl.value = "[Ticket " + String(id).slice(0, 8) + "] ";
          msgEl.focus();
          if (typeof syncMsgTextareaHeight === "function") syncMsgTextareaHeight();
        }

    function extractGuidedSteps(md) {
      const clean =
        window.LiveSheet && typeof window.LiveSheet.strip === "function"
          ? window.LiveSheet.strip(md || "")
          : String(md || "");
      const out = [];
      const h = clean.match(/^##\s*plan\b[^\n]*/im);
      if (!h) return out;
      const start = clean.indexOf(h[0]) + h[0].length;
      const tail = clean.slice(start);
      const n2 = tail.search(/^##\s+/m);
      const chunk = (n2 >= 0 ? tail.slice(0, n2) : tail).split("\n");
      for (const raw of chunk) {
        const line = raw.trim();
        const num = /^(\d+)\.\s+(.+)$/.exec(line);
        if (num) {
          out.push({ kind: "num", text: num[2].trim() });
          continue;
        }
        const task = /^-\s+\[([ xX])\]\s+(.+)$/.exec(line);
        if (task) {
          out.push({ kind: "task", text: task[2].trim() });
        }
      }
      return out;
    }

    function desktopNeedsHumanAck(action) {
      return !!(window.__HELPDESK_DESKTOP_FORCE_ACK__ || action.sensitive);

    async function desktopExecOneAction(action, hitlAckEl) {
      const nd = getNativeDesk();
      const ackNeeded = desktopNeedsHumanAck(action);
      if (ackNeeded && nd) {
        const msg =
          "Paso " +
          (action.sensitive ? "sensible" : "con confirmación obligatoria en el servidor") +
          ". ¿Ejecutar en el escritorio?";
        if (!confirm(msg)) return "cancelado";
      }
      if (nd) {
        return (await nd.runAction(action)) || null;
      }
      if (window.__HELPDESK_DESKTOP_PY__) {
        if (ackNeeded && (!hitlAckEl || !hitlAckEl.checked)) {
          return "Marca la confirmación (human-in-the-loop) para ejecutar con PyAutoGUI.";
        }
        try {
          const r = await fetch("/api/desktop/exec", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              action: action,
              human_ack: !!(ackNeeded && hitlAckEl && hitlAckEl.checked),
            }),
          });
          const j = await r.json().catch(() => ({}));
          if (!r.ok) {
            const d = j.detail;
            return typeof d === "string"
              ? d
              : Array.isArray(d)
                ? d.map((e) => e.msg || JSON.stringify(e)).join("; ")
                : JSON.stringify(j);
          }
        } catch (e) {
          return String(e.message || e);
        }
        return null;
      }
      return "No hay ejecutor: abre la app Electron o activa PyAutoGUI en localhost.";
    }

    function desktopActionLabel(a) {

      if (t === "hotkey") return "Atajo: " + (Array.isArray(a.keys) ? a.keys.join("+") : "");
      if (t === "type") return "Escribir: " + String(a.text || "").slice(0, 72) + (String(a.text || "").length > 72 ? "…" : "");
      if (t === "move") return "Mover ratón (fracción pantalla)";
      if (t === "click") return "Clic " + (a.button || "left");
      return t;
    }

    async function submitChatCore({ message, screenshots, interaction }) {
      const turnId = (crypto.randomUUID ? crypto.randomUUID().slice(0, 12) : (Date.now().toString(16) + Math.random().toString(16).slice(2, 6)));
      const thinking = addThinkingCard();
      try { thinking.attachTrace(turnId); } catch (_) {}
      btnSend.disabled = true;
      try {
        const payload = {
          message: message,
          thread_id: threadId,
          turn_id: turnId,
          screenshots: (screenshots || []).map((u) => b64FromDataUrl(u)),
        };
        if (interaction) payload.interaction = interaction;
        const nd = getNativeDesk();
        if (nd) payload.client_os = nd.clientPlatform;
        const r = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const j = await r.json();
        if (!r.ok) {
          const d = j.detail;
          const msg =
            typeof d === "string"
              ? d
              : Array.isArray(d)
                ? d.map((e) => e.msg || JSON.stringify(e)).join("; ")
                : JSON.stringify(j);
          throw new Error(msg);
        }
        thinking.clear();
        pendingShots.length = 0;
        renderShotPreview();
        const rawReply = j.reply;
        lastAssistantRawReply = rawReply;
        if (guidedActive) {
          const newSteps = extractGuidedSteps(lastAssistantRawReply);
          if (newSteps.length > 0) {
            guidedSteps = newSteps;
            guidedStepIndex = 0;
          } else if (guidedAdvanceAfterReply && guidedSteps.length) {
            guidedStepIndex = Math.min(guidedStepIndex + 1, guidedSteps.length - 1);
          }
          guidedAdvanceAfterReply = false;
          syncGuidedBarUi();
        }
        const displayMd = window.LiveSheet ? window.LiveSheet.strip(rawReply) : rawReply;
        const wrap = addMessage("assistant", renderMarkdown(displayMd), { isMarkdown: true });
        if (window.LiveSheet) window.LiveSheet.afterAssistantReply(rawReply, wrap);
        if (typeof window.helpdeskRenderWidgets === "function") {
          try {
            const m = rawReply && rawReply.match(/```helpdesk-ui\s*([\s\S]*?)```/i);
            if (m) {
              const data = JSON.parse(m[1]);
              const container = wrap.querySelector(".md-content") || wrap;
              window.helpdeskRenderWidgets(data, container);
            }
          } catch (_) {}
        }
        if (j.desktop_plan && Array.isArray(j.desktop_plan.actions) && j.desktop_plan.actions.length) {
          attachDesktopPlanPanel(wrap, j.desktop_plan);
        }
        if (j.desktop_run && j.desktop_run.run_id && window.helpdeskAttachAutomation) {
          window.helpdeskAttachAutomation(j.desktop_run.run_id);
        }
        attachSourcesToolsPanel(wrap, j);
        updateDesktopHint();
        return j;
      } catch (err) {
        guidedAdvanceAfterReply = false;
        thinking.clear();
        addMessage("assistant", renderMarkdown("**Error**\n\n```\n" + err.message + "\n```"), { isMarkdown: true });
        throw err;
      } finally {
        btnSend.disabled = false;
        loadTickets();
      }
    }

    }

    function wireAssistantTaskCheckboxes(bubble) {

      md.querySelectorAll('input[type="checkbox"]').forEach((cb) => {
        if (cb.dataset.hdWired === "1") return;
        cb.dataset.hdWired = "1";
        cb.removeAttribute("disabled");
        cb.disabled = false;
        cb.style.cursor = "pointer";
        cb.addEventListener("change", async () => {
          const li = cb.closest("li");
          let text = "";
          if (li) {
            const clone = li.cloneNode(true);
            clone.querySelectorAll("input").forEach((i) => i.remove());
            text = clone.textContent.replace(/\s+/g, " ").trim().slice(0, 500);
          }
          const msg =
            (cb.checked ? "He marcado como hecho: " : "He desmarcado: ") + (text || "(tarea)");
          try {
            await liveSheetChat({
              message: msg,
              screenshots: [],
              interaction: { type: "checklist_update", payload: { checked: cb.checked, text: text } },
            });
          } catch (_) {
            cb.checked = !cb.checked;
          }
        });
      });
    }

    document.getElementById("f").addEventListener("submit", async (e) => {
      e.preventDefault();
      const ta = document.getElementById("msg");
      const text = ta.value.trim();
      if (!text) return;
      const shots = pendingShots.slice();
      const userDisplay =
        text + (shots.length ? "\n\n*[" + shots.length + " captura(s) → análisis por visión]*" : "");
      ta.value = "";
      syncMsgTextareaHeight();
      addMessage("user", userDisplay, { isMarkdown: false });
      try {
        await submitChatCore({ message: text, screenshots: shots, interaction: undefined });
      } catch (_) {}
    });

    if (window.LiveSheet) {
      window.LiveSheet.init({
        getThreadId: function () {
          return threadId;
        },
        chat: liveSheetChat,
      });
    }

    loadCapabilities();
    updateDesktopHint();
    addMessage(
      "assistant",
      renderMarkdown(
        "## Bienvenido al centro de soporte TI\n\nPuedes describir la incidencia abajo; con un caso concreto el asistente intentará **crear un ticket** y darte el **ID**. Usa los **accesos rápidos** o **Imagen** / **Pantalla** si quieres adjuntar capturas.\n\n- **Guiado:** si la respuesta incluye un plan con pasos, pulsa **Guiado** junto a las herramientas para seguirlo con capturas por paso.\n- **Tickets:** en el panel izquierdo; clic para detalle.\n- **Plan en vivo:** pestaña inferior sobre el área de mensaje (Kanban, sliders).\n- **Tu equipo:** si pides algo como «abre ajustes de batería» o «desactiva el ahorro de energía», el asistente puede preparar un **plan de automatización**; cuando exista, verás debajo de su mensaje los pasos y botones para ejecutarlos (Electron o PyAutoGUI en localhost). Si usas solo el navegador, define `HELPDESK_DESKTOP_PY_EXEC=1` en el entorno del servidor y reinicia.\n- **Fuentes:** tras cada respuesta puedes desplegar *Fuentes y herramientas* para ver documentos KB, enlaces web y qué herramientas usó el agente.\n\n> *Saludos muy genéricos* no abren ticket; en cuanto haya un síntoma concreto, actuamos."
      ),
      { isMarkdown: true }
    );
    window.helpdeskSubmitChat = async function (text) {
      if (!text) return;
      addMessage("user", text, { isMarkdown: false });
      try { await submitChatCore({ message: text, screenshots: [], interaction: undefined }); } catch (_) {}
    };
    loadTickets();
  </script>

  <aside id="automationPanel" hidden>
    <header>
      <span id="apStatus">Automatización en vivo</span>
      <button id="apAbort" type="button">Abortar</button>
    </header>
    <div id="apThumbWrap"><img id="apThumb" alt="captura" /></div>
    <div id="apStepInfo"></div>
    <ol id="apHistory"></ol>
  </aside>

  <div id="apConfirmModal" hidden>
    <div class="ap-modal-card">
      <h3>Confirmar paso sensible</h3>
      <img id="apConfirmImg" alt="captura completa" />
      <pre id="apConfirmAction"></pre>
      <div class="ap-modal-buttons">
        <button id="apConfirmApprove" type="button">Aprobar</button>
        <button id="apConfirmCancel" type="button">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="/static/step_cards.js" defer></script>
  <script src="/static/agent_trace.js" defer></script>
  <script src="/static/widgets.js" defer></script>
  <script src="/static/automation_panel.js" defer></script>
</body>
</html>
